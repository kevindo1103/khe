<script type="text/babel">
const { useState } = React;

/* ===========================================================================

const t = {
  color: {
    ink:          "#1A1A1A",
    inkMuted:     "#6B7280",
    inkSubtle:    "#9CA3AF",
    surface:      "#FFFFFF",
    rowHover:     "#F9FAFB",
    border:       "#E5E7EB",
    borderStrong: "#D1D5DB",
    primary:      "#0F7A56", primarySoft: "#E7F3EE",
    amber:        "#D97706", amberSoft:   "#FEF3E2",
    red:          "#DC2626", redSoft:     "#FDECEC",
    gray:         "#6B7280", graySoft:    "#F3F4F6",
  },
  font: {
    family: "'Inter', 'Be Vietnam Pro', system-ui, -apple-system, sans-serif",
    size: { xs: 12, sm: 13, md: 14, base: 15, lg: 18, xl: 22, "2xl": 26 },
    weight: { regular: 400, medium: 500, semibold: 600, bold: 700 },
  },

  radius: { sm: 6, md: 8, lg: 12, pill: 999 },
};

/* Feature flag — Beta chip on "Hỏi-đáp" (G10, removable post-#277) */
const BETA_CHAT = true;

/* Static "today" for relative-deadline math */
const TODAY = new Date("2026-06-26");

/* DEC-029 — doc_type → VN display label (all 10 enums). Snake_case NEVER renders. */
const DOC_TYPE_LABELS = {
  hd_nha_cung_cap:      "Nhà cung cấp",
  hd_thue_mat_bang:     "Thuê mặt bằng",
  hd_lao_dong:          "Lao động",
  hd_dan_su:            "Dân sự",
  hd_bat_dong_san:      "Bất động sản",
  hd_van_tai_logistics: "Vận tải & Logistics",
  hd_xay_dung:          "Xây dựng",
  hd_cong_nghe_ip:      "Công nghệ & IP",
  hd_tai_chinh:         "Tài chính",
  hd_hanh_chinh:        "Hành chính",
};
const docTypeLabel = (dt) => DOC_TYPE_LABELS[dt] || "Chưa phân loại";

/* ===========================================================================
 * Sample data — 8 rows exercising all 7 row states + 3 direction cases.
 * Shaped as target GET /documents/ payload (Backend #279 API delta).
 * ========================================================================= */
const DOCS = [
  // 1 · unconfirmed + near deadline (action-required → top). Mixed direction (G4 case 1).
  { id:1, doc_type:"hd_thue_mat_bang",     primary_party:"Cty TNHH Hải Đăng",
    filename:"223692#FCV_thue_matbang_Q7_signed.pdf",
    nghia_vu_count:5, quyen_loi_count:2, direction_null_count:3,
    obligation_count:10, next_due_date:"2026-07-08",
    confirmed:false, pipeline:"extracted", may_have_unextracted:false, duplicate:false },
  // 2 · confirmed + OVERDUE obligation (red). All-classified direction (G4 case 1 clean).
  { id:2, doc_type:"hd_nha_cung_cap",      primary_party:"Cty CP Bao Bì Việt",
    filename:"hopdong_baobi_2026.pdf",
    nghia_vu_count:4, quyen_loi_count:0, direction_null_count:0,
    obligation_count:4, next_due_date:"2026-06-23",
    confirmed:true, pipeline:"extracted", may_have_unextracted:false, duplicate:false },
  // 3 · STANDING-ONLY (G3): obligations exist, all without a date (NDA / non-compete).
  { id:3, doc_type:"hd_lao_dong",           primary_party:"Nguyễn Văn An",
    filename:"HDLD_NguyenVanAn_2026.pdf",
    nghia_vu_count:2, quyen_loi_count:1, direction_null_count:0,
    obligation_count:3, next_due_date:null,
    confirmed:true, pipeline:"extracted", may_have_unextracted:false, duplicate:false },
  // 4 · unconfirmed + completeness ⚠ (may_have_unextracted=true). Quyền-lợi heavy.
  { id:4, doc_type:"hd_xay_dung",           primary_party:"Cty Xây Dựng Trường Sơn",
    filename:"thau_xaydung_kho_BinhTan.pdf",
    nghia_vu_count:3, quyen_loi_count:6, direction_null_count:0,
    obligation_count:9, next_due_date:"2026-07-15",
    confirmed:false, pipeline:"extracted", may_have_unextracted:true, duplicate:false },
  // 5 · legacy doc — completeness NULL "?" + ALL-NULL direction "3?" (G4 case 3).
  { id:5, doc_type:"hd_dan_su",             primary_party:"Ông Trần Văn B",
    filename:"phuluc_dansu_cu.pdf",
    nghia_vu_count:0, quyen_loi_count:0, direction_null_count:3,
    obligation_count:3, next_due_date:"2026-08-01",
    confirmed:true, pipeline:"extracted", may_have_unextracted:null, duplicate:false },
  // 6 · DUPLICATE suspected ("!"). Zero obligations → em dash (G4 case 4).
  { id:6, doc_type:"hd_nha_cung_cap",      primary_party:"Cty CP Bao Bì Việt",
    filename:"hopdong_baobi_2026 (1).pdf",
    nghia_vu_count:0, quyen_loi_count:0, direction_null_count:0,
    obligation_count:0, next_due_date:null,
    confirmed:false, pipeline:"extracted", may_have_unextracted:false, duplicate:true },
  // 7 · PROCESSING (pipeline state). No obligations yet.
  { id:7, doc_type:"hd_van_tai_logistics",  primary_party:"Cty Vận Tải Phương Nam",
    filename:"vantai_logistics_Q3.pdf",
    nghia_vu_count:0, quyen_loi_count:0, direction_null_count:0,
    obligation_count:0, next_due_date:null,
    confirmed:false, pipeline:"processing", may_have_unextracted:null, duplicate:false },
  // 8 · confirmed + quiet (far deadline) → bottom of sort.
  { id:8, doc_type:"hd_cong_nghe_ip",       primary_party:"Cty Phần Mềm FSoft",
    filename:"license_phanmem_IP.pdf",
    nghia_vu_count:2, quyen_loi_count:1, direction_null_count:0,
    obligation_count:3, next_due_date:"2026-11-30",
    confirmed:true, pipeline:"extracted", may_have_unextracted:false, duplicate:false },
];

/* G2 — sort: action-required first → nearest deadline → confirmed+quiet last */
function sortDocs(arr) {
  const overdue = (d) => d.next_due_date && new Date(d.next_due_date) < TODAY;
  const actionReq = (d) => (!d.confirmed && d.pipeline !== "processing") || overdue(d);
  const due = (d) => d.next_due_date ? new Date(d.next_due_date).getTime() : Infinity;
  return [...arr].sort((a, b) => {
    const ak = actionReq(a) ? 0 : 1, bk = actionReq(b) ? 0 : 1;
    return ak - bk || due(a) - due(b);
  });
}

/* Relative deadline formatting */
function fmtDue(iso) {
  const d = new Date(iso);
  const dm = `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`;
  const diff = Math.round((d - TODAY) / 86400000);
  if (diff < 0) return { dm, label:`quá hạn ${-diff} ngày`, overdue:true };
  if (diff === 0) return { dm, label:"hôm nay", overdue:false, soon:true };
  return { dm, label:`còn ${diff} ngày`, overdue:false, soon:diff<=7 };
}

/* ===========================================================================
 * Cell components
 * ========================================================================= */
function DirectionCell({ d }) {
  if (d.obligation_count === 0)
    return <span style={{ color:t.color.inkSubtle }}>—</span>;
  const parts = [];
  if (d.nghia_vu_count > 0)
    parts.push(<span key="nv"><strong>{d.nghia_vu_count}</strong><span style={{color:t.color.inkMuted}}>↑</span> NV</span>);
  if (d.quyen_loi_count > 0)
    parts.push(<span key="ql"><strong>{d.quyen_loi_count}</strong><span style={{color:t.color.inkMuted}}>↓</span> QL</span>);
  if (d.direction_null_count > 0)
    parts.push(<span key="nu" style={{color:t.color.inkMuted}} title="Chưa xác định loại nghĩa vụ">{d.direction_null_count}?</span>);
  return (
    <span style={{ fontSize:t.font.size.sm }}>
      {parts.map((p, i) => (
        <React.Fragment key={i}>
          {i > 0 && <span style={{color:t.color.border}}> · </span>}
          {p}
        </React.Fragment>
      ))}
    </span>
  );
}

function DueCell({ d }) {
  if (d.next_due_date) {
    const f = fmtDue(d.next_due_date);
    const color = f.overdue ? t.color.red : f.soon ? t.color.amber : t.color.inkMuted;
    return (
      <span style={{ fontSize:t.font.size.sm }}>
        <span style={{color:t.color.ink}}>{f.dm}</span>
        <span style={{color:t.color.border}}> · </span>
        <span style={{ color, fontWeight: f.overdue ? t.font.weight.semibold : t.font.weight.regular }}>
          {f.label}
        </span>
      </span>
    );
  }
  if (d.obligation_count > 0)
    return <span style={{ fontSize:t.font.size.sm, color:t.color.inkMuted, fontStyle:"italic" }}>Cam kết đang hiệu lực</span>;
  return <span style={{ color:t.color.inkSubtle }}>—</span>;
}

function CompletenessIcon({ value }) {
  if (value === false || value === undefined) return null;
  const amber = value === true;
  return (
    <span
      title={amber ? "Có thể còn nghĩa vụ chưa bóc — xem chi tiết điều khoản" : "Chưa kiểm tra toàn bộ điều khoản"}
      style={{ marginLeft:t.space[2], fontSize:t.font.size.sm, fontWeight:t.font.weight.bold,
        color: amber ? t.color.amber : t.color.gray, cursor:"help" }}
    >{amber ? "⚠" : "?"}</span>
  );
}

function StatusPill({ d }) {
  let label, fg, bg;
  if (d.pipeline === "processing")   { label="Đang xử lý";   fg=t.color.gray;    bg=t.color.graySoft; }
  else if (!d.confirmed)             { label="Cần xác nhận"; fg=t.color.amber;   bg=t.color.amberSoft; }
  else                               { label="Đã xác nhận";  fg=t.color.primary; bg=t.color.primarySoft; }
  return (
    <span style={{ display:"inline-flex", alignItems:"center" }}>
      <span style={{ background:bg, color:fg, padding:`${t.space[1]}px ${t.space[2]}px`,
        borderRadius:t.radius.pill, fontSize:t.font.size.xs,
        fontWeight:t.font.weight.semibold, whiteSpace:"nowrap", display:"inline-flex", alignItems:"center" }}>
        {label}
      </span>
      <CompletenessIcon value={d.may_have_unextracted} />
    </span>
  );
}

/* ===========================================================================
 * Sidebar
 * ========================================================================= */
function NavItem({ glyph, label, active, badge, beta }) {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:t.space[2],
      padding:`${t.space[2]}px ${t.space[3]}px`, borderRadius:t.radius.md, cursor:"pointer",
      background: active ? t.color.primarySoft : "transparent",
      color: active ? t.color.primary : t.color.ink,
      fontWeight: active ? t.font.weight.semibold : t.font.weight.regular,
      fontSize:t.font.size.md }}>
      <span style={{ width:16, textAlign:"center", color: active ? t.color.primary : t.color.inkMuted }}>{glyph}</span>
      <span style={{ flex:1 }}>{label}</span>
      {beta && <span style={{ fontSize:10, fontWeight:t.font.weight.semibold, color:t.color.amber,
        background:t.color.amberSoft, padding:"1px 6px", borderRadius:t.radius.pill }}>Beta</span>}
      {badge != null && badge > 0 && (
        <span style={{ fontSize:t.font.size.xs, fontWeight:t.font.weight.semibold, color:t.color.surface,
          background:t.color.amber, minWidth:18, textAlign:"center",
          padding:"0 5px", borderRadius:t.radius.pill }}>{badge}</span>
      )}
    </div>
  );
}

function Sidebar({ pendingCount }) {
  const grp = { fontSize:t.font.size.xs, fontWeight:t.font.weight.semibold, color:t.color.inkSubtle,
    letterSpacing:0.5, textTransform:"uppercase", padding:`${t.space[2]}px ${t.space[3]}px ${t.space[1]}px` };
  return (
    <aside style={{ width:220, minWidth:220, borderRight:`1px solid ${t.color.border}`,
      padding:t.space[4], background:t.color.surface }}>
      <div style={{ fontSize:t.font.size.xl, fontWeight:t.font.weight.bold, color:t.color.primary,
        padding:`${t.space[2]}px ${t.space[3]}px ${t.space[5]}px` }}>Khế</div>
      <div style={grp}>Theo dõi</div>
      <NavItem glyph="○" label="Tổng quan" />
      <NavItem glyph="◇" label="Nghĩa vụ & Quyền lợi" />
      <div style={grp}>Tài liệu</div>
      <NavItem glyph="■" label="Hồ sơ hợp đồng" active badge={pendingCount} />
      <NavItem glyph="↑" label="Tải lên" />
      <div style={grp}>Trợ lý</div>
      <NavItem glyph="✦" label="Hỏi-đáp" beta={BETA_CHAT} />
    </aside>
  );
}

/* ===========================================================================
 * Header chips + filters
 * ========================================================================= */
function CounterChip({ children, tone, onClick }) {
  const map = {
    amber: { fg:t.color.amber, bd:t.color.amber, bg:t.color.amberSoft },
    red:   { fg:t.color.red,   bd:t.color.red,   bg:t.color.redSoft },
    muted: { fg:t.color.inkMuted, bd:t.color.border, bg:"transparent" },
  };
  const s = map[tone];
  return (
    <button onClick={onClick} style={{ border:`1px solid ${s.bd}`, background:s.bg, color:s.fg,
      padding:`${t.space[1]}px ${t.space[3]}px`, borderRadius:t.radius.pill,
      fontSize:t.font.size.sm, fontWeight:t.font.weight.medium,
      fontFamily:t.font.family, cursor:"pointer" }}>{children}</button>
  );
}

function FilterChip({ label, count, active, muted, onClick }) {
  return (
    <button onClick={onClick} style={{ display:"inline-flex", alignItems:"center", gap:t.space[1],
      padding:`${t.space[1]}px ${t.space[3]}px`, borderRadius:t.radius.pill,
      fontFamily:t.font.family, fontSize:t.font.size.sm, cursor:"pointer",
      fontWeight: active ? t.font.weight.semibold : t.font.weight.medium,
      border:`1px solid ${active ? t.color.primary : t.color.border}`,
      background: active ? t.color.primary : t.color.surface,
      color: active ? t.color.surface : muted ? t.color.inkMuted : t.color.ink }}>
      {label}
      {count != null && (
        <span style={{ fontSize:t.font.size.xs, fontWeight:t.font.weight.semibold,
          color: active ? t.color.surface : t.color.inkMuted }}>{count}</span>
      )}
    </button>
  );
}

/* ===========================================================================
 * POPULATED STATE
 * ========================================================================= */
function DocumentsListV2() {
  const [filter, setFilter]       = useState("all");
  const [q, setQ]                 = useState("");
  const [showPipeline, setShowPipeline] = useState(false);
  const [hoverId, setHoverId]     = useState(null);

  const total   = DOCS.length;
  const pending = DOCS.filter(d => !d.confirmed && d.pipeline !== "processing").length;
  const dueSoon = DOCS.filter(d => d.next_due_date && (() => {
    const x = Math.round((new Date(d.next_due_date) - TODAY) / 86400000);
    return x >= 0 && x <= 7;
  })()).length;
  const overdue = DOCS.filter(d => d.next_due_date && new Date(d.next_due_date) < TODAY).length;

  const COMMITMENT_FILTERS = [
    { key:"all",      label:"Tất cả",           count:total },
    { key:"due7",     label:"Tới hạn 7 ngày",   count:dueSoon },
    { key:"overdue",  label:"Quá hạn",           count:overdue },
    { key:"pending",  label:"Cần xác nhận",      count:pending },
    { key:"rights",   label:"Quyền lợi cần thu", count:DOCS.filter(d=>d.quyen_loi_count>0).length },
  ];
  const PIPELINE_FILTERS = [
    { key:"processing",   label:"Đang xử lý" },
    { key:"extracted",    label:"Đã bóc tách" },
    { key:"needs_review", label:"Cần kiểm tra" },
  ];

  const match = (d) => {
    if (q && !(`${docTypeLabel(d.doc_type)} ${d.primary_party} ${d.filename}`
        .toLowerCase().includes(q.toLowerCase()))) return false;
    switch(filter) {
      case "all":     return true;
      case "due7":    return d.next_due_date && (() => { const x=Math.round((new Date(d.next_due_date)-TODAY)/86400000); return x>=0&&x<=7; })();
      case "overdue": return d.next_due_date && new Date(d.next_due_date) < TODAY;
      case "pending": return !d.confirmed && d.pipeline !== "processing";
      case "rights":  return d.quyen_loi_count > 0;
      default:        return d.pipeline === filter;
    }
  };
  const rows = sortDocs(DOCS.filter(match));

  const COLS = [
    { key:"contract",  label:"Hợp đồng",              w:"34%" },
    { key:"type",      label:"Loại",                   w:"11%" },
    { key:"direction", label:"Nghĩa vụ · Quyền lợi",  w:"18%" },
    { key:"due",       label:"Hạn gần nhất",           w:"19%" },
    { key:"status",    label:"Trạng thái",             w:"18%" },
  ];

  const th = { textAlign:"left", padding:`${t.space[2]}px ${t.space[3]}px`, color:t.color.inkMuted,
    fontWeight:t.font.weight.semibold, fontSize:t.font.size.xs, textTransform:"uppercase",
    letterSpacing:0.3, borderBottom:`1px solid ${t.color.borderStrong}`, whiteSpace:"nowrap",
    background:"#fafafa" };
  const td = { padding:`${t.space[3]}px`, borderBottom:`1px solid ${t.color.border}`, verticalAlign:"middle" };

  return (
    <div style={{ display:"flex", minHeight:"calc(100vh - 44px)", background:t.color.surface, fontFamily:t.font.family, color:t.color.ink }}>
      <Sidebar pendingCount={pending} />
      <main style={{ flex:1, padding:t.space[8], minWidth:0 }}>

        {/* Header */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:t.space[4], flexWrap:"wrap" }}>
          <div>
            <h1 style={{ fontSize:t.font.size["2xl"], fontWeight:t.font.weight.bold, color:t.color.ink, margin:0 }}>
              Hồ sơ hợp đồng
            </h1>
            <div style={{ fontSize:t.font.size.md, color:t.color.inkMuted, marginTop:t.space[2] }}>
              {pending} cần xác nhận · {dueSoon} nghĩa vụ tới hạn · {total} hợp đồng
            </div>
          </div>
          <button style={{ background:t.color.primary, color:"#fff", border:"none",
            padding:`${t.space[2]}px ${t.space[5]}px`, borderRadius:t.radius.md,
            fontSize:t.font.size.md, fontWeight:t.font.weight.semibold, cursor:"pointer",
            fontFamily:t.font.family }}>
            + Tải hợp đồng
          </button>
        </div>

        {/* Counter chips */}
        <div style={{ display:"flex", gap:t.space[2], flexWrap:"wrap", marginTop:t.space[4] }}>
          <CounterChip tone="amber" onClick={() => setFilter("pending")}>
            {pending}/{total} cần xác nhận
          </CounterChip>
          <CounterChip tone={overdue>0 ? "red" : "muted"} onClick={() => setFilter(overdue>0 ? "overdue" : "due7")}>
            {dueSoon} NV tới hạn 7 ngày{overdue>0 ? ` · ${overdue} quá hạn` : ""}
          </CounterChip>
          <CounterChip tone="muted">{total} hợp đồng</CounterChip>
        </div>

        {/* Search + filters */}
        <div style={{ marginTop:t.space[5] }}>
          <input value={q} onChange={e=>setQ(e.target.value)}
            placeholder="🔍  Tìm theo tên hoặc đối tác..."
            style={{ width:"100%", maxWidth:360, height:40, padding:`0 ${t.space[3]}px`,
              fontSize:t.font.size.md, fontFamily:t.font.family, border:`1px solid ${t.color.border}`,
              borderRadius:t.radius.md, outline:"none", color:t.color.ink }} />

          {/* Row 1 — commitment-state */}
          <div style={{ display:"flex", gap:t.space[2], flexWrap:"wrap", marginTop:t.space[3] }}>
            {COMMITMENT_FILTERS.map(f => (
              <FilterChip key={f.key} label={f.label} count={f.count}
                active={filter===f.key} onClick={() => setFilter(f.key)} />
            ))}
            <button onClick={() => setShowPipeline(s=>!s)} style={{ border:"none", background:"transparent",
              color:t.color.inkMuted, cursor:"pointer", fontSize:t.font.size.sm,
              fontFamily:t.font.family, padding:`${t.space[1]}px ${t.space[2]}px` }}>
              {showPipeline ? "Ẩn trạng thái xử lý ▴" : "Trạng thái xử lý ▾"}
            </button>
          </div>

          {/* Row 2 — pipeline-state (collapsible) */}
          {showPipeline && (
            <div style={{ display:"flex", gap:t.space[2], flexWrap:"wrap", marginTop:t.space[2] }}>
              {PIPELINE_FILTERS.map(f => (
                <FilterChip key={f.key} label={f.label} muted active={filter===f.key} onClick={() => setFilter(f.key)} />
              ))}
            </div>
          )}
        </div>

        {/* Glyph legend (G7) */}
        <div style={{ fontSize:t.font.size.xs, color:t.color.inkMuted, marginTop:t.space[4] }}>
          <strong style={{color:t.color.ink}}>↑ NV</strong> = nghĩa vụ (mình phải làm) ·{" "}
          <strong style={{color:t.color.ink}}>↓ QL</strong> = quyền lợi (mình được nhận) ·{" "}
          <strong style={{color:t.color.ink}}>?</strong> = chưa xác định
        </div>

        {/* Table */}
        <div style={{ marginTop:t.space[3], border:`1px solid ${t.color.border}`, borderRadius:t.radius.lg, overflow:"hidden" }}>
          <table style={{ width:"100%", borderCollapse:"collapse" }}>
            <colgroup>{COLS.map(c => <col key={c.key} style={{width:c.w}} />)}</colgroup>
            <thead>
              <tr>{COLS.map(c => <th key={c.key} style={th}>{c.label}</th>)}</tr>
            </thead>
            <tbody>
              {rows.length === 0 ? (
                <tr><td colSpan={5} style={{...td, textAlign:"center", color:t.color.inkMuted, padding:t.space[10]}}>
                  Không có hợp đồng phù hợp bộ lọc.
                </td></tr>
              ) : rows.map(d => (
                <tr key={d.id}
                  onMouseEnter={() => setHoverId(d.id)}
                  onMouseLeave={() => setHoverId(null)}
                  style={{ background: hoverId===d.id ? t.color.rowHover : t.color.surface, cursor:"pointer" }}>

                  {/* Col 1 — Hợp đồng */}
                  <td style={td}>
                    <div style={{ display:"flex", alignItems:"center", gap:t.space[2] }}>
                      <span style={{ fontSize:t.font.size.base, fontWeight:t.font.weight.medium,
                        color:t.color.ink, textDecoration: hoverId===d.id ? "underline" : "none" }}>
                        HĐ {docTypeLabel(d.doc_type)} với {d.primary_party}
                      </span>
                      {d.duplicate && (
                        <span title="Tệp trùng — kiểm tra"
                          style={{ color:t.color.amber, fontWeight:t.font.weight.bold,
                            fontSize:t.font.size.sm, cursor:"help" }}>!</span>
                      )}
                    </div>
                    <div style={{ fontSize:t.font.size.xs, color:t.color.inkMuted, marginTop:2,
                      overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth:300 }}>
                      {d.filename}
                    </div>
                  </td>

                  {/* Col 2 — Loại */}
                  <td style={{...td, color:t.color.inkMuted, fontSize:t.font.size.sm}}>
                    {docTypeLabel(d.doc_type)}
                  </td>

                  {/* Col 3 — Nghĩa vụ · Quyền lợi */}
                  <td style={td}><DirectionCell d={d} /></td>

                  {/* Col 4 — Hạn gần nhất */}
                  <td style={td}><DueCell d={d} /></td>

                  {/* Col 5 — Trạng thái */}
                  <td style={td}><StatusPill d={d} /></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {/* 7 row states legend */}
        <div style={{ marginTop:t.space[6], padding:t.space[4], background:t.color.graySoft,
          borderRadius:t.radius.lg, fontSize:t.font.size.xs, color:t.color.inkMuted, lineHeight:1.8 }}>
          <div style={{ fontWeight:t.font.weight.semibold, color:t.color.ink, marginBottom:t.space[1] }}>
            📐 7 trạng thái hàng (Designer annotation — không render trong production)
          </div>
          <div>
            <strong style={{color:t.color.ink}}>①</strong> Đã xác nhận bình thường (trắng) ·{" "}
            <strong style={{color:t.color.red}}>②</strong> Quá hạn — "quá hạn N ngày" đỏ Cột 4 ·{" "}
            <strong style={{color:t.color.amber}}>③</strong> Cần xác nhận — pill amber Cột 5 (NO viền hàng — G6) ·{" "}
            <strong style={{color:t.color.inkMuted}}>④</strong> Standing-only — "Cam kết đang hiệu lực" Cột 4 (G3) ·{" "}
            <strong style={{color:t.color.amber}}>⑤</strong> Completeness ⚠/? Cột 5 (DEC-045) ·{" "}
            <strong style={{color:t.color.ink}}>⑥</strong> Hover — nền #F9FAFB + gạch chân ·{" "}
            <strong style={{color:t.color.amber}}>⑦</strong> Nghi trùng — "!" Cột 1
          </div>
          <div style={{ marginTop:t.space[1] }}>
            <strong style={{color:t.color.ink}}>Sort (G2):</strong> cần xác nhận / quá hạn → hạn gần nhất tăng dần → đã xác nhận+yên tĩnh ·{" "}
            <strong style={{color:t.color.ink}}>Direction (G4):</strong> hàng #1 mixed · #5 all-NULL "3?" · #6 zero "—" · "?" không bao giờ ẩn (D-13) ·{" "}
            <strong style={{color:t.color.ink}}>CTA (G5):</strong> luôn "Tải hợp đồng" — chip đếm gánh role nudge
          </div>
        </div>
      </main>
    </div>
  );
}

 * EMPTY STATE (Day-1 concierge)
 * ========================================================================= */

      <Sidebar pendingCount={0} />
      <main style={{ flex:1, padding:t.space[8], minWidth:0 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:t.space[4], flexWrap:"wrap" }}>
          <div>
            <h1 style={{ fontSize:t.font.size["2xl"], fontWeight:t.font.weight.bold, color:t.color.ink, margin:0 }}>
              Hồ sơ hợp đồng
            </h1>
            <div style={{ fontSize:t.font.size.md, color:t.color.inkMuted, marginTop:t.space[2] }}>
              Chưa có hợp đồng nào — tải lên để Khế bắt đầu theo dõi nghĩa vụ & quyền lợi.
            </div>
          </div>
          <button style={{ background:t.color.primary, color:"#fff", border:"none",
            padding:`${t.space[2]}px ${t.space[5]}px`, borderRadius:t.radius.md,
            fontSize:t.font.size.md, fontWeight:t.font.weight.semibold, cursor:"pointer",
            fontFamily:t.font.family }}>
            + Tải hợp đồng
          </button>
        </div>

        {/* Empty illustration */}
        <div style={{ marginTop:t.space[8], border:`1.5px dashed ${t.color.borderStrong}`,
          borderRadius:t.radius.lg, background:t.color.surface,
          padding:`${t.space[12]}px ${t.space[6]}px`, textAlign:"center" }}>
          <div style={{ fontSize:52, lineHeight:1 }}>📄</div>
          <div style={{ fontSize:t.font.size.xl, fontWeight:t.font.weight.bold, color:t.color.ink, marginTop:t.space[4] }}>
            Tải hợp đồng đầu tiên
          </div>
          <div style={{ fontSize:t.font.size.md, color:t.color.inkMuted, maxWidth:480,
            margin:`${t.space[3]}px auto 0`, lineHeight:1.65 }}>
            Khế đọc hợp đồng, bóc tách <strong>nghĩa vụ</strong> (mình phải làm) và{" "}
            <strong>quyền lợi</strong> (mình được nhận), rồi nhắc bạn trước khi tới hạn.
            Bắt đầu chỉ với một file PDF hoặc ảnh chụp.
          </div>
          <div style={{ display:"flex", gap:t.space[3], justifyContent:"center", marginTop:t.space[6], flexWrap:"wrap" }}>
            <button style={{ background:t.color.primary, color:"#fff", border:"none",
              padding:`${t.space[3]}px ${t.space[6]}px`, borderRadius:t.radius.md,
              fontSize:t.font.size.md, fontWeight:t.font.weight.semibold, cursor:"pointer",
              fontFamily:t.font.family }}>
              + Tải hợp đồng
            </button>
            <button style={{ background:t.color.surface, color:t.color.ink,
              border:`1px solid ${t.color.borderStrong}`,
              padding:`${t.space[3]}px ${t.space[6]}px`, borderRadius:t.radius.md,
              fontSize:t.font.size.md, fontWeight:t.font.weight.medium, cursor:"pointer",
              fontFamily:t.font.family }}>
              Tải nhiều file (≤20)
            </button>
          </div>
          <div style={{ fontSize:t.font.size.sm, color:t.color.inkSubtle, marginTop:t.space[6] }}>
            Được onboard theo diện concierge? Đại lý / luật sư của bạn có thể số hóa giúp tận nơi.
          </div>
        </div>

        <div style={{ marginTop:t.space[5], padding:t.space[4], background:t.color.graySoft,
          borderRadius:t.radius.lg, fontSize:t.font.size.xs, color:t.color.inkMuted, lineHeight:1.7 }}>
          <strong style={{color:t.color.ink}}>📐 Ghi chú:</strong>{" "}
          Header skeleton giữ nguyên layout của trạng thái có dữ liệu. CTA cố định "Tải hợp đồng" (G5).
          Bulk ≤20 = concierge DEC-012. Không bịa số liệu ở 0 hợp đồng.
        </div>
      </main>
    </div>

}

/* ===========================================================================
 * Root — tabs toggle between the two views
 * ========================================================================= */
function App() {
  const [tab, setTab] = useState("populated");
  window.__switchTab = (t) => setTab(t);
  return tab === "populated" ? <DocumentsListV2 /> : <DocumentsListV2Empty />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
function switchTab(tab) {
  if (window.__switchTab) window.__switchTab(tab);
  document.getElementById("btn-populated").classList.toggle("active", tab === "populated");
  document.getElementById("btn-empty").classList.toggle("active", tab === "empty");
}
</script>
</body>
</html>
