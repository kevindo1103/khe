name: PR Quality Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  branch-pattern-check:
    name: Branch Pattern Check
    runs-on: ubuntu-latest
    steps:
      - name: Verify branch naming convention
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "PR branch: $BRANCH"
          if echo "$BRANCH" | grep -qE '^(claude|windsurf)/' || \
             echo "$BRANCH" | grep -qE '^(main|staging|claude/edit-git-docs-Khe01|claude/pm-assistant)$'; then
            echo "✅ Branch pattern OK: $BRANCH"
          else
            echo "❌ Branch '$BRANCH' does not match required pattern: claude/* or windsurf/* or long-lived branch"
            echo "   Rename your branch before opening a PR."
            exit 1
          fi

  scope-lock:
    name: Scope Lock Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check file ownership scope
        run: |
          BRANCH="${{ github.head_ref }}"
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }}..HEAD)
          VIOLATIONS=""

          # docs/ only from docs-editor branch
          # Exceptions: mockup files from designer, docs/teams/*_STATE.md from any session
          if echo "$CHANGED" | grep -qE "^docs/"; then
            if [[ "$BRANCH" != "claude/edit-git-docs-Khe01" ]]; then
              PROTECTED_DOCS=$(echo "$CHANGED" | grep "^docs/" \
                | grep -v "^docs/mockup_.*\.jsx$" \
                | grep -v "^docs/teams/.*_STATE\.md$" \
                || true)
              if [[ -n "$PROTECTED_DOCS" ]]; then
                if [[ "$BRANCH" == claude/design-* ]]; then
                  VIOLATIONS="${VIOLATIONS}\n❌ Designer branch touching non-mockup docs: ${PROTECTED_DOCS}"
                else
                  VIOLATIONS="${VIOLATIONS}\n❌ docs/ modified by non-docs-editor branch: ${PROTECTED_DOCS}"
                fi
              fi
            fi
          fi

          # .github/workflows/ only from infra branches (claude/infra-* or claude/chore-infra-*)
          if echo "$CHANGED" | grep -q "^\.github/workflows/"; then
            if [[ "$BRANCH" != claude/infra-* && "$BRANCH" != claude/chore-infra-* ]]; then
              VIOLATIONS="${VIOLATIONS}\n❌ .github/workflows/ modified by non-infra branch ($BRANCH)"
            fi
          fi

          if [[ -n "$VIOLATIONS" ]]; then
            echo -e "SCOPE-LOCK VIOLATIONS:${VIOLATIONS}"
            echo ""
            echo "Fix: remove out-of-scope files from this PR."
            echo "If cross-lane work is needed, file a separate issue (from: + for:)."
            exit 1
          fi
          echo "✅ Scope-lock check passed"

  backend-check:
    name: Backend Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if backend exists
        id: backend_exists
        run: |
          if [ -d "backend" ] && [ -f "backend/main.py" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  backend/ not found — skipping backend checks"
          fi

      - name: Set up Python
        if: steps.backend_exists.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        if: steps.backend_exists.outputs.exists == 'true'
        run: |
          cd backend
          pip install -r requirements.txt --quiet

      - name: Backend import check
        if: steps.backend_exists.outputs.exists == 'true'
        run: |
          cd backend
          python -c "import main"
          echo "✅ backend import OK"

      - name: Alembic single-head check
        if: steps.backend_exists.outputs.exists == 'true'
        run: |
          cd backend
          HEAD_COUNT=$(alembic heads | grep -c "(head)" || true)
          echo "Alembic heads: $HEAD_COUNT"
          if [ "$HEAD_COUNT" -eq 1 ]; then
            echo "✅ Single alembic head OK"
          else
            echo "❌ Expected 1 alembic head, got $HEAD_COUNT — resolve migration branch conflict"
            exit 1
          fi

  frontend-check:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if frontend exists
        id: frontend_exists
        run: |
          if [ -d "frontend" ] && [ -f "frontend/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  frontend/ not found — skipping frontend checks"
          fi

      - name: Set up Node
        if: steps.frontend_exists.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: steps.frontend_exists.outputs.exists == 'true'
        run: |
          cd frontend
          npm ci --quiet

      - name: Frontend build check
        if: steps.frontend_exists.outputs.exists == 'true'
        run: |
          cd frontend
          npm run build
          echo "✅ frontend build OK"
