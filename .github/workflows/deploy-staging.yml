name: Deploy to Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

env:
  DEPLOY_ENV: staging

jobs:
  quality-gate:
    name: Pre-deploy Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Backend check
        run: |
          if [ -d "backend" ] && [ -f "backend/main.py" ]; then
            pip install -r backend/requirements.txt --quiet
            cd backend && python -c "import main"
            echo "✅ backend import OK"
          else
            echo "⚠️  backend/ not found — skipping"
          fi

      - name: Frontend build
        run: |
          if [ -d "frontend" ] && [ -f "frontend/package.json" ]; then
            cd frontend && npm ci --quiet && npm run build
            echo "✅ frontend build OK"
          else
            echo "⚠️  frontend/ not found — skipping"
          fi

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4

      # ── Backend deploy ───────────────────────────────────────────────
      - name: Deploy backend to staging VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GOOGLE_SA_JSON_B64: ${{ secrets.GOOGLE_SA_JSON_B64 }}
          DOCAI_PROJECT_ID: ${{ secrets.DOCAI_PROJECT_ID }}
          DOCAI_LOCATION: ${{ secrets.DOCAI_LOCATION }}
          DOCAI_PROCESSOR_ID: ${{ secrets.DOCAI_PROCESSOR_ID }}
        run: |
          if [ -z "$VPS_HOST" ]; then
            echo "⚠️  VPS_HOST secret not set — skipping VPS deploy (set secret to enable)"
            exit 0
          fi
          if [ ! -d "backend" ]; then
            echo "⚠️  backend/ not found — skipping VPS deploy"
            exit 0
          fi

          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Bootstrap VPS dirs + system deps on first deploy
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "mkdir -p /opt/khe/backend-staging /opt/khe/frontend-staging /opt/khe/pwa-staging /opt/khe/data-staging && \
             [ -d /opt/khe/backend-staging/venv ] || python3 -m venv /opt/khe/backend-staging/venv && \
             dpkg -s poppler-utils >/dev/null 2>&1 || sudo apt-get install -y poppler-utils"

          rsync -az --delete --exclude=venv --exclude=.env \
            --exclude=master.db --exclude='tenants/' --exclude='storage/' \
            --exclude='google-sa.json' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./backend/ "$VPS_USER@$VPS_HOST:/opt/khe/backend-staging/"

          # Deploy Google Cloud service account JSON for Document AI (hybrid_ocr)
          if [ -n "$GOOGLE_SA_JSON_B64" ]; then
            echo "$GOOGLE_SA_JSON_B64" | base64 -d \
              | ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
                "cat > /opt/khe/backend-staging/google-sa.json && chmod 600 /opt/khe/backend-staging/google-sa.json"
            echo "✅ Google SA JSON deployed to staging"
            GOOGLE_CREDS_LINE="GOOGLE_APPLICATION_CREDENTIALS=/opt/khe/backend-staging/google-sa.json"
          else
            echo "⚠️  GOOGLE_SA_JSON_B64 not set — hybrid_ocr Document AI will be unavailable"
            GOOGLE_CREDS_LINE=""
          fi

          # Write secrets to .env on VPS via stdin pipe (values masked by GH Actions in logs)
          {
            printf 'GEMINI_API_KEY=%s\nCLAUDE_API_KEY=%s\nJWT_SECRET=%s\nTELEGRAM_BOT_TOKEN=%s\nCORS_ORIGINS=%s\nDATA_DIR=%s\n' \
              "$GEMINI_API_KEY" "$CLAUDE_API_KEY" "$JWT_SECRET" "$TELEGRAM_BOT_TOKEN" \
              "https://staging.khe.iceflow.cloud" \
              "/opt/khe/data-staging"
            [ -n "$GOOGLE_CREDS_LINE" ] && printf '%s\n' "$GOOGLE_CREDS_LINE"
            [ -n "$DOCAI_PROJECT_ID" ] && printf 'DOCAI_PROJECT_ID=%s\nDOCAI_LOCATION=%s\nDOCAI_PROCESSOR_ID=%s\n' \
              "$DOCAI_PROJECT_ID" "$DOCAI_LOCATION" "$DOCAI_PROCESSOR_ID"
          } | ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
              "cat > /opt/khe/backend-staging/.env && chmod 600 /opt/khe/backend-staging/.env"

          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" bash <<'REMOTE'
            set -e
            cd /opt/khe/backend-staging
            source venv/bin/activate
            pip install -r requirements.txt --quiet
            alembic upgrade head
            python scripts/migrate_all_tenants.py
            sudo systemctl restart khe-backend-staging
            echo "✅ staging backend restarted"
          REMOTE

      # ── HTTPS check (warning only — auth cookie requires Secure flag over HTTPS) ──
      - name: HTTPS staging check
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -z "$VPS_HOST" ]; then exit 0; fi
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          TLS_OK=$(ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "curl -s -o /dev/null -w '%{http_code}' --max-time 5 https://staging.khe.iceflow.cloud/health || echo 000")
          if [ "$TLS_OK" = "200" ]; then
            echo "✅ staging HTTPS OK (HTTP $TLS_OK)"
          else
            echo "⚠️  staging HTTPS not reachable (HTTP $TLS_OK) — HttpOnly auth cookies require Secure+HTTPS to work in browsers. Run certbot on VPS before deploying auth (#46)."
          fi

      # ── Frontend deploy ──────────────────────────────────────────────
      - name: Build & deploy frontend to staging
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ ! -d "frontend" ]; then
            echo "⚠️  frontend/ not found — skipping"
            exit 0
          fi
          if [ -z "$VPS_HOST" ]; then
            echo "⚠️  VPS_HOST secret not set — skipping"
            exit 0
          fi

          cd frontend
          npm ci --quiet
          VITE_API_BASE_URL=https://staging.khe.iceflow.cloud/api npm run build

          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./dist/ "$VPS_USER@$VPS_HOST:/opt/khe/frontend-staging/"

          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "sudo systemctl reload nginx && echo '✅ nginx reloaded (staging)'"

      # ── PWA deploy ───────────────────────────────────────────────────
      - name: Build & deploy PWA to staging
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ ! -d "frontend/pwa" ]; then
            echo "⚠️  frontend/pwa/ not found — skipping"
            exit 0
          fi
          if [ -z "$VPS_HOST" ]; then
            echo "⚠️  VPS_HOST secret not set — skipping"
            exit 0
          fi

          cd frontend/pwa
          npm ci --quiet
          VITE_API_BASE_URL=https://staging.khe.iceflow.cloud/api npm run build

          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./dist/ "$VPS_USER@$VPS_HOST:/opt/khe/pwa-staging/"

          echo "✅ PWA deployed to /opt/khe/pwa-staging/ — nginx routing update pending Frontend_Admin base path fix (#86)"
