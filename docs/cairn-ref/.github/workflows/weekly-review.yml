name: Weekly Review

# Cairn framework — observability cron (C-6 automated signal, non-blocking).
#
# Runs the Weekly Review checklist and posts a digest issue so the docs-editor
# reads findings instead of running the queries by hand. This is automated +
# deterministic but does NOT block anything — an "automated alarm", distinct
# from a Tier-1 blocking gate.
#
# ── CUSTOMIZE PER PROJECT ────────────────────────────────────────────────
# - {{TEAM_LIST}} — space-separated team names matching docs/teams/<team>_STATE.md
# - Item 4 uses `--base staging` — if your project has no staging branch,
#   change to `main` or delete Item 4.
# - cron time below is UTC. Adjust to your team's low-traffic window.
# ─────────────────────────────────────────────────────────────────────────
#
# Auth: default GITHUB_TOKEN — sufficient for issue read/create/close in the
# same repo. No PAT needed.
#
# GitHub Actions quirk: scheduled workflows only fire from the default branch
# (main). This file must be on main for the cron to run.

on:
  schedule:
    - cron: '0 1 * * 1'   # every Monday 01:00 UTC — adjust per project
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  review:
    name: Run checklist + post digest
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      TEAM_LIST: "{{TEAM_LIST}}"   # e.g. "backend frontend infra qc"
    steps:
      - name: Checkout (full history for git log queries)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run checklist
        run: |
          set -uo pipefail

          TODAY=$(date +%Y-%m-%d)
          D3=$(date -d '3 days ago' +%Y-%m-%d)
          D1=$(date -d '1 day ago' +%Y-%m-%d)
          D7=$(date -d '7 days ago' +%Y-%m-%d)
          DIGEST=/tmp/digest.md
          FLAGS=0

          {
            echo "## [Weekly Review] $TODAY — automated checklist"
            echo ""
            echo "> Generated by \`.github/workflows/weekly-review.yml\` (Cairn observability cron)."
            echo "> docs-editor: read findings, append to \`DOCS_INBOX.md §Weekly Review Log\`,"
            echo "> create follow-up issues for actionable items, then close this digest."
            echo ">"
            echo "> ⚠️ **Coverage — cron tự động hoá 6/9 item của checklist canonical.**"
            echo "> Auto: item 1-5 + 7 (item 7 = best-effort eyeball). **CHƯA cover — docs-editor"
            echo "> PHẢI chạy tay:** item 6 (DOCS_INBOX Pending > 7 ngày unfolded), item 8"
            echo "> (for:* label routing mismatch), item 9 (Rule Promotion candidates P-09)."
            echo "> Checklist đầy đủ 9 item: \`DOCS_INBOX.md §Weekly Review\`. Digest này KHÔNG"
            echo "> thay thế manual pass — số section dưới khớp số checklist (thiếu §6 = nhắc tay)."
            echo ""
          } > "$DIGEST"

          # ── Item 1 — stale status:planned (>3 days untouched) ──────────────
          echo "→ Item 1: stale status:planned"
          OUT=$(gh issue list --repo "$REPO" --label "status:planned" --state open \
            --search "updated:<$D3" --json number,title,updatedAt \
            --jq '.[] | "- #\(.number) \(.title) _(updated \(.updatedAt[:10]))_"' 2>/dev/null) || OUT="ERROR"
          {
            echo "### 1. Stale \`status:planned\` issues (>3 days untouched)"
            if [ "$OUT" = "ERROR" ]; then echo "⚠️ query error — check manually"
            elif [ -z "$OUT" ]; then echo "✅ clean"
            else echo "⚠️ found:"; echo ""; echo "$OUT"; FLAGS=$((FLAGS+1)); fi
            echo ""
          } >> "$DIGEST"

          # ── Item 2 — task-assignment missing ## Plan section ───────────────
          echo "→ Item 2: missing ## Plan"
          OUT=$(gh issue list --repo "$REPO" --label "task-assignment" --state open \
            --json number,title,body \
            --jq '.[] | select(.body | contains("## Plan") | not) | "- #\(.number) \(.title)"' 2>/dev/null) || OUT="ERROR"
          {
            echo "### 2. \`task-assignment\` issues missing \`## Plan\` section"
            if [ "$OUT" = "ERROR" ]; then echo "⚠️ query error — check manually"
            elif [ -z "$OUT" ]; then echo "✅ clean"
            else echo "⚠️ found:"; echo ""; echo "$OUT"; FLAGS=$((FLAGS+1)); fi
            echo ""
          } >> "$DIGEST"

          # ── Item 3 — blocker:human-needed open >24h ────────────────────────
          echo "→ Item 3: blocker:human-needed >24h"
          OUT=$(gh issue list --repo "$REPO" --label "blocker:human-needed" --state open \
            --search "created:<$D1" --json number,title,createdAt \
            --jq '.[] | "- #\(.number) \(.title) _(created \(.createdAt[:10]))_"' 2>/dev/null) || OUT="ERROR"
          {
            echo "### 3. \`blocker:human-needed\` issues open >24h"
            if [ "$OUT" = "ERROR" ]; then echo "⚠️ query error — check manually"
            elif [ -z "$OUT" ]; then echo "✅ clean"
            else echo "⚠️ found — needs user/PM decision:"; echo ""; echo "$OUT"; FLAGS=$((FLAGS+1)); fi
            echo ""
          } >> "$DIGEST"

          # ── Item 4 — PRs merged to staging w/ Closes #N, issue still open ──
          # If no staging branch: change --base to main, or delete this item.
          echo "→ Item 4: merged staging PRs with un-closed issues"
          ITEM4=""
          PRS=$(gh pr list --repo "$REPO" --base staging --state merged \
            --search "merged:>$D7" --json number,body \
            --jq '.[] | "\(.number)\t\(.body // "" | gsub("[\\n\\r]";" "))"' 2>/dev/null) || PRS="ERROR"
          if [ "$PRS" = "ERROR" ]; then
            ITEM4="ERROR"
          elif [ -n "$PRS" ]; then
            while IFS=$'\t' read -r PR BODY; do
              [ -z "$PR" ] && continue
              for N in $(echo "$BODY" | grep -oiE 'close[sd]? #[0-9]+' | grep -oE '[0-9]+' | sort -u); do
                STATE=$(gh issue view "$N" --repo "$REPO" --json state --jq '.state' 2>/dev/null) || STATE="UNKNOWN"
                if [ "$STATE" = "OPEN" ]; then
                  ITEM4="${ITEM4}- PR #${PR} declares \`Closes #${N}\` but issue #${N} still OPEN"$'\n'
                fi
              done
            done <<< "$PRS"
          fi
          {
            echo "### 4. PRs merged to \`staging\` with un-closed \`Closes #N\` issue"
            if [ "$ITEM4" = "ERROR" ]; then echo "⚠️ query error — check manually"
            elif [ -z "$ITEM4" ]; then echo "✅ clean"
            else echo "⚠️ found — manually close with \`state_reason: completed\`:"; echo ""
              printf '%s' "$ITEM4"; FLAGS=$((FLAGS+1)); fi
            echo ""
          } >> "$DIGEST"

          # ── Item 5 — team STATE.md stale (>7 days) ─────────────────────────
          echo "→ Item 5: stale STATE.md"
          ITEM5=""
          for TEAM in $TEAM_LIST; do
            FILE="docs/teams/${TEAM}_STATE.md"
            if [ -f "$FILE" ]; then
              LAST=$(git log -1 --format=%cd --date=short -- "$FILE" 2>/dev/null)
              if [ -n "$LAST" ]; then
                AGE=$(( ( $(date +%s) - $(date -d "$LAST" +%s) ) / 86400 ))
                if [ "$AGE" -gt 7 ]; then
                  ITEM5="${ITEM5}- \`${TEAM}_STATE.md\` last updated ${LAST} (${AGE} days ago)"$'\n'
                fi
              fi
            fi
          done
          {
            echo "### 5. Team \`STATE.md\` stale (>7 days)"
            echo "_(checks files present on \`main\` only)_"
            if [ -z "$ITEM5" ]; then echo "✅ clean"
            else echo "⚠️ found:"; echo ""; printf '%s' "$ITEM5"; FLAGS=$((FLAGS+1)); fi
            echo ""
          } >> "$DIGEST"

          # ── Item 7 — cross-scope commits (best-effort, no auto-judge) ──────
          # Numbered 7 to match canonical checklist (DOCS_INBOX §Weekly Review).
          # No §6 in this digest by design — item 6 is a manual-only check.
          echo "→ Item 7: recent commits for scope eyeball"
          # -n 40 (not `| head`) — git itself limits output, avoids SIGPIPE
          # killing git log under `set -o pipefail` + Actions' implicit `bash -e`.
          OUT=$(git log --all --since="7 days ago" --no-merges -n 40 \
            --pretty=format:'%h|%an|%s' 2>/dev/null)
          {
            echo "### 7. Recent commits — eyeball for pair scope violations"
            echo "_(best-effort: last 7 days, max 40 commits. Cross-ref file paths with CLAUDE.md §Topology scope table manually.)_"
            if [ -z "$OUT" ]; then echo "✅ no commits in window"
            else
              echo ""; echo '```'
              echo "$OUT" | while IFS='|' read -r H A S; do echo "$H  $A  $S"; done
              echo '```'
            fi
            echo ""
          } >> "$DIGEST"

          # ── Summary footer ─────────────────────────────────────────────────
          {
            echo "---"
            echo ""
            if [ "$FLAGS" -eq 0 ]; then echo "**Summary:** ✅ all items clean."
            else echo "**Summary:** ⚠️ $FLAGS item(s) flagged — see above."; fi
          } >> "$DIGEST"

          echo "──── digest preview ────"
          cat "$DIGEST"

      - name: Create digest issue + close previous
        run: |
          set -uo pipefail
          TODAY=$(date +%Y-%m-%d)
          NEW_URL=$(gh issue create --repo "$REPO" \
            --title "[Weekly Review] $TODAY — automated checklist" \
            --body-file /tmp/digest.md \
            --label "from:infra" --label "for:docs-editor" --label "audit-finding")
          echo "::notice::Created weekly review digest: $NEW_URL"
          NEW_NUM="${NEW_URL##*/}"

          # Close older open digests so they don't accumulate (~52/year).
          gh issue list --repo "$REPO" --state open --label "audit-finding" \
            --search 'in:title "[Weekly Review]"' --json number \
            --jq '.[].number' 2>/dev/null | while read -r N; do
            [ -z "$N" ] && continue
            [ "$N" = "$NEW_NUM" ] && continue
            gh issue close "$N" --repo "$REPO" \
              --comment "Superseded by newer weekly review digest #${NEW_NUM}." \
              --reason completed && echo "  closed superseded digest #$N"
          done
