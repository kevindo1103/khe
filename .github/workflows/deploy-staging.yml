name: Deploy to Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

env:
  DEPLOY_ENV: staging

jobs:
  quality-gate:
    name: Pre-deploy Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Backend check
        run: |
          if [ -d "backend" ] && [ -f "backend/main.py" ]; then
            pip install -r backend/requirements.txt --quiet
            cd backend && python -c "import main"
            echo "✅ backend import OK"
          else
            echo "⚠️  backend/ not found — skipping"
          fi

      - name: Frontend build
        run: |
          if [ -d "frontend" ] && [ -f "frontend/package.json" ]; then
            cd frontend && npm ci --quiet && npm run build
            echo "✅ frontend build OK"
          else
            echo "⚠️  frontend/ not found — skipping"
          fi

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: quality-gate
    environment: staging
    steps:
      - uses: actions/checkout@v4

      # ── Backend deploy ───────────────────────────────────────────────
      - name: Deploy backend to staging VPS
        env:
          VPS_HOST: ${{ secrets.STAGING_VPS_HOST }}
          VPS_USER: ${{ secrets.STAGING_VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.STAGING_VPS_SSH_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          if [ -z "$VPS_HOST" ]; then
            echo "⚠️  STAGING_VPS_HOST secret not set — skipping VPS deploy (set secret to enable)"
            exit 0
          fi

          # Write SSH key
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Rsync backend
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./backend/ "$VPS_USER@$VPS_HOST:/opt/khe/backend/"

          # Remote: install deps + run alembic + restart service
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" bash <<'REMOTE'
            set -e
            cd /opt/khe/backend
            source venv/bin/activate
            pip install -r requirements.txt --quiet
            alembic upgrade head
            sudo systemctl restart khe-backend-staging
            echo "✅ staging backend restarted"
          REMOTE

      # ── Frontend deploy ──────────────────────────────────────────────
      - name: Build & deploy frontend to staging
        env:
          VPS_HOST: ${{ secrets.STAGING_VPS_HOST }}
          VPS_USER: ${{ secrets.STAGING_VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.STAGING_VPS_SSH_KEY }}
        run: |
          if [ ! -d "frontend" ]; then
            echo "⚠️  frontend/ not found — skipping"
            exit 0
          fi
          if [ -z "$VPS_HOST" ]; then
            echo "⚠️  STAGING_VPS_HOST secret not set — skipping"
            exit 0
          fi

          cd frontend
          npm ci --quiet
          VITE_API_BASE_URL=https://staging.khe.vn/api npm run build

          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./dist/ "$VPS_USER@$VPS_HOST:/opt/khe/frontend-staging/"

          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "sudo systemctl reload nginx && echo '✅ nginx reloaded (staging)'"
