name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DEPLOY_ENV: production

jobs:
  quality-gate:
    name: Pre-deploy Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Backend check
        run: |
          if [ -d "backend" ] && [ -f "backend/main.py" ]; then
            pip install -r backend/requirements.txt --quiet
            cd backend && python -c "import main"
            echo "✅ backend import OK"
          else
            echo "⚠️  backend/ not found — skipping"
          fi

      - name: Frontend build
        run: |
          if [ -d "frontend" ] && [ -f "frontend/package.json" ]; then
            cd frontend && npm ci --quiet && npm run build
            echo "✅ frontend build OK"
          else
            echo "⚠️  frontend/ not found — skipping"
          fi

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: quality-gate
    environment: production
    steps:
      - uses: actions/checkout@v4

      # ── Backend deploy ───────────────────────────────────────────────
      - name: Deploy backend to production VPS
        env:
          VPS_HOST: ${{ secrets.PROD_VPS_HOST }}
          VPS_USER: ${{ secrets.PROD_VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.PROD_VPS_SSH_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          if [ -z "$VPS_HOST" ]; then
            echo "⚠️  PROD_VPS_HOST secret not set — skipping VPS deploy (set secret to enable)"
            exit 0
          fi

          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./backend/ "$VPS_USER@$VPS_HOST:/opt/khe/backend/"

          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" bash <<'REMOTE'
            set -e
            cd /opt/khe/backend
            source venv/bin/activate
            pip install -r requirements.txt --quiet
            alembic upgrade head
            sudo systemctl restart khe-backend
            echo "✅ production backend restarted"
          REMOTE

      # ── Frontend deploy ──────────────────────────────────────────────
      - name: Build & deploy frontend to production
        env:
          VPS_HOST: ${{ secrets.PROD_VPS_HOST }}
          VPS_USER: ${{ secrets.PROD_VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.PROD_VPS_SSH_KEY }}
        run: |
          if [ ! -d "frontend" ]; then
            echo "⚠️  frontend/ not found — skipping"
            exit 0
          fi
          if [ -z "$VPS_HOST" ]; then
            echo "⚠️  PROD_VPS_HOST secret not set — skipping"
            exit 0
          fi

          cd frontend
          npm ci --quiet
          VITE_API_BASE_URL=https://khe.vn/api npm run build

          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./dist/ "$VPS_USER@$VPS_HOST:/opt/khe/frontend/"

          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "sudo systemctl reload nginx && echo '✅ nginx reloaded (production)'"

      - name: Notify Telegram on success
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "⚠️  Telegram secrets not set — skipping notification"
            exit 0
          fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="✅ Khế production deploy OK — commit ${{ github.sha }} by ${{ github.actor }}"

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            exit 0
          fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="❌ Khế production deploy FAILED — commit ${{ github.sha }} by ${{ github.actor }} — check Actions log"
