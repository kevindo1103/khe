name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DEPLOY_ENV: production

jobs:
  quality-gate:
    name: Pre-deploy Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Backend check
        run: |
          if [ -d "backend" ] && [ -f "backend/main.py" ]; then
            pip install -r backend/requirements.txt --quiet
            cd backend && python -c "import main"
            echo "✅ backend import OK"
          else
            echo "⚠️  backend/ not found — skipping"
          fi

      - name: Frontend build
        run: |
          if [ -d "frontend" ] && [ -f "frontend/package.json" ]; then
            cd frontend && npm ci --quiet && npm run build
            echo "✅ frontend build OK"
          else
            echo "⚠️  frontend/ not found — skipping"
          fi

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: quality-gate
    environment: production
    steps:
      - uses: actions/checkout@v4

      # ── Backend deploy ───────────────────────────────────────────────
      - name: Deploy backend to production VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GOOGLE_SA_JSON_B64: ${{ secrets.GOOGLE_SA_JSON_B64 }}
          DOCAI_PROJECT_ID: ${{ secrets.DOCAI_PROJECT_ID }}
          DOCAI_LOCATION: ${{ secrets.DOCAI_LOCATION }}
          DOCAI_PROCESSOR_ID: ${{ secrets.DOCAI_PROCESSOR_ID }}
        run: |
          if [ -z "$VPS_HOST" ]; then
            echo "⚠️  VPS_HOST secret not set — skipping VPS deploy (set secret to enable)"
            exit 0
          fi
          if [ ! -d "backend" ]; then
            echo "⚠️  backend/ not found — skipping VPS deploy"
            exit 0
          fi

          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Bootstrap VPS dirs + system deps on first deploy
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "mkdir -p /opt/khe/backend /opt/khe/frontend /opt/khe/pwa /opt/khe/data && \
             [ -d /opt/khe/backend/venv ] || python3 -m venv /opt/khe/backend/venv && \
             dpkg -s poppler-utils >/dev/null 2>&1 || sudo apt-get install -y poppler-utils"

          rsync -az --delete --exclude=venv --exclude=.env \
            --exclude=master.db --exclude='tenants/' --exclude='storage/' \
            --exclude='google-sa.json' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./backend/ "$VPS_USER@$VPS_HOST:/opt/khe/backend/"

          # Deploy Google Cloud service account JSON for Document AI (hybrid_ocr)
          if [ -n "$GOOGLE_SA_JSON_B64" ]; then
            echo "$GOOGLE_SA_JSON_B64" | base64 -d \
              | ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
                "cat > /opt/khe/backend/google-sa.json && chmod 600 /opt/khe/backend/google-sa.json"
            echo "✅ Google SA JSON deployed to production"
            GOOGLE_CREDS_LINE="GOOGLE_APPLICATION_CREDENTIALS=/opt/khe/backend/google-sa.json"
          else
            echo "⚠️  GOOGLE_SA_JSON_B64 not set — hybrid_ocr Document AI will be unavailable"
            GOOGLE_CREDS_LINE=""
          fi

          # Write secrets to .env on VPS via stdin pipe (values masked by GH Actions in logs)
          {
            printf 'GEMINI_API_KEY=%s\nCLAUDE_API_KEY=%s\nJWT_SECRET=%s\nTELEGRAM_BOT_TOKEN=%s\nCORS_ORIGINS=%s\nDATA_DIR=%s\n' \
              "$GEMINI_API_KEY" "$CLAUDE_API_KEY" "$JWT_SECRET" "$TELEGRAM_BOT_TOKEN" \
              "https://khe.iceflow.cloud" \
              "/opt/khe/data"
            [ -n "$GOOGLE_CREDS_LINE" ] && printf '%s\n' "$GOOGLE_CREDS_LINE"
            [ -n "$DOCAI_PROJECT_ID" ] && printf 'DOCAI_PROJECT_ID=%s\nDOCAI_LOCATION=%s\nDOCAI_PROCESSOR_ID=%s\n' \
              "$DOCAI_PROJECT_ID" "$DOCAI_LOCATION" "$DOCAI_PROCESSOR_ID"
          } | ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
              "cat > /opt/khe/backend/.env && chmod 600 /opt/khe/backend/.env"

          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" bash <<'REMOTE'
            set -e
            cd /opt/khe/backend
            source venv/bin/activate
            pip install -r requirements.txt --quiet
            alembic upgrade head
            [ -f scripts/migrate_all_tenants.py ] && python scripts/migrate_all_tenants.py || echo "⚠️  migrate_all_tenants.py not found — skipping"
            sudo systemctl restart khe-backend
            echo "✅ production backend restarted"
          REMOTE

      # ── Frontend deploy ──────────────────────────────────────────────
      - name: Build & deploy frontend to production
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ ! -d "frontend" ]; then
            echo "⚠️  frontend/ not found — skipping"
            exit 0
          fi
          if [ -z "$VPS_HOST" ]; then
            echo "⚠️  VPS_HOST secret not set — skipping"
            exit 0
          fi

          cd frontend
          npm ci --quiet
          VITE_API_BASE_URL=https://khe.iceflow.cloud/api npm run build

          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./dist/ "$VPS_USER@$VPS_HOST:/opt/khe/frontend/"

          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "sudo systemctl reload nginx && echo '✅ nginx reloaded (production)'"

      # ── PWA deploy ───────────────────────────────────────────────────
      - name: Build & deploy PWA to production
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ ! -d "frontend/pwa" ]; then
            echo "⚠️  frontend/pwa/ not found — skipping"
            exit 0
          fi
          if [ -z "$VPS_HOST" ]; then
            echo "⚠️  VPS_HOST secret not set — skipping"
            exit 0
          fi

          cd frontend/pwa
          npm ci --quiet
          VITE_API_BASE_URL=https://khe.iceflow.cloud/api npm run build

          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./dist/ "$VPS_USER@$VPS_HOST:/opt/khe/pwa/"

          echo "✅ PWA deployed to /opt/khe/pwa/ — nginx routing update pending Frontend_Admin base path fix (#86)"

      - name: Notify Telegram on success
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "⚠️  Telegram secrets not set — skipping notification"
            exit 0
          fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="✅ Khế production deploy OK — commit ${{ github.sha }} by ${{ github.actor }}"

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            exit 0
          fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="❌ Khế production deploy FAILED — commit ${{ github.sha }} by ${{ github.actor }} — check Actions log"
